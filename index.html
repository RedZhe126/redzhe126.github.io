<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>redzhe126 | 開發者作品集</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FF7E36;
            --primary-light: #FFAE63;
            --background: #FAFAFC;
            --text-main: #1C1C1E;
            --text-muted: #8E8E93;
            --card-bg: #ffffff;
            --radius-lg: 28px;
            --radius-md: 18px;
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* 背景裝飾 */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,126,54,0.1) 0%, rgba(255,126,54,0) 70%);
            border-radius: 50%;
            filter: blur(80px);
        }

        .glow-1 { top: -200px; right: -200px; }
        .glow-2 { bottom: -200px; left: -200px; }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 80px 24px;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 80px;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 30px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            font-weight: 800;
            box-shadow: 0 20px 40px rgba(255, 126, 54, 0.2);
        }

        header h1 {
            font-size: 48px;
            font-weight: 900;
            letter-spacing: -1.5px;
            margin-bottom: 12px;
        }

        header p {
            font-size: 18px;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
        }

        /* App 列表區域 */
        .section-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(0,0,0,0.05);
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 32px;
        }

        .app-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 32px;
            text-decoration: none;
            color: inherit;
            border: 1px solid rgba(0,0,0,0.03);
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .app-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 60px rgba(255, 126, 54, 0.1);
            border-color: rgba(255, 126, 54, 0.1);
        }

        .app-icon {
            width: 72px;
            height: 72px;
            border-radius: 18px;
            margin-bottom: 24px;
            object-fit: cover;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .app-icon.shijue {
            background: linear-gradient(135deg, #FF7E36, #FFAE63);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
            font-weight: 800;
        }

        .app-card h3 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .app-card .tag {
            font-size: 12px;
            background: #f2f2f7;
            padding: 4px 12px;
            border-radius: 100px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .app-card p {
            font-size: 15px;
            color: var(--text-muted);
            margin-bottom: 24px;
            flex: 1;
        }

        .btn-view {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
            font-weight: 700;
            font-size: 15px;
            transition: var(--transition);
        }

        .app-card:hover .btn-view {
            gap: 12px;
        }

        /* 頁尾 */
        footer {
            margin-top: 100px;
            text-align: center;
            padding-top: 40px;
            border-top: 1px solid rgba(0,0,0,0.05);
            color: var(--text-muted);
            font-size: 14px;
        }

        @media (max-width: 600px) {
            header h1 { font-size: 36px; }
            .container { padding: 40px 20px; }
        }
    </style>
</head>
<body>
    <div class="bg-glow">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <div class="container">
        <header>
            <div class="profile-img">R</div>
            <h1>redzhe126</h1>
            <p>獨立開發者，致力於透過創新的科技解決生活中的小難題。專注於打造極致流暢且美觀的行動應用體驗。</p>
        </header>

        <h2 class="section-title">我的應用程式作品</h2>

        <div class="app-grid">
            <!-- 食決 Foodie Choice -->
            <a href="foodie-choice.html" class="app-card">
                <div class="app-icon shijue">決</div>
                <div class="tag">iOS / Android</div>
                <h3>食決 ShiJue</h3>
                <p>選擇困難終結者！整合地圖定位與營業時間解析演算法，帶您探索周遭美食，不再為每餐吃什麼而猶豫。</p>
                <div class="btn-view">
                    查看詳情 <span>→</span>
                </div>
            </a>

            <!-- 預留未來作品 -->
            <div class="app-card" style="opacity: 0.6; cursor: default; border-style: dashed;">
                <div class="app-icon" style="background: #e5e5ea;"></div>
                <div class="tag">Coming Soon</div>
                <h3 style="color: #8e8e93;">下一個精彩作品</h3>
                <p>新的創意正在醞釀中，敬請期待更多的美味科技解決方案...</p>
            </div>
        </div>

        <footer>
            &copy; 2026 redzhe126. All Rights Reserved.<br>
            聯絡開發者：<a href="mailto:showing-fondue-6u@icloud.com" style="color: inherit; text-decoration: none;">showing-fondue-6u@icloud.com</a>
        </footer>
    </div>
</body>
</html>
